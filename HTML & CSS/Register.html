<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        button {
            margin-left: 50px;
        }

        .form {
            background-color: rgb(181, 234, 234);
            width: 500px;
            height: 590px;
            margin-left: 400px;
            margin-top: 50px;
            border-radius: 10px;
        }

        h2 {
            padding-top: 20px;
            text-align: center;
            font-family: 'Times New Roman', Times, serif;
        }
    </style>

</head>

<body>

   <nav class="navbar navbar-expand-lg bg-body-tertiary" style="margin: 0px; padding: 0px;">
        <div class="container-fluid bg-dark  pb-2">
            <a class="navbar-brand text-white" href="#">My Website</a>

            <a href="Home.html">Home</a>
            <a href="Register.html">Register</a>
            <a href="login.html">Login</a>
            <a href="#">Gallery</a>
            <a href="#">Contact us</a>

        </div>
    </nav>



    <div class="form">

        <form>
            <h2><b>Registration Form</b></h2>
            <div class="m-4 p-3 w-70">
                <label for="exampleInputEmail1" class="form-label"><b>Name :</b></label>
                <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                    placeholder="Enter your name" required>

            </div>
            <div class="m-4 p-3 w-70">
                <label for="exampleInputEmail1" class="form-label"><b>Email :</b></label>
                <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                    placeholder="Enter your email" required>
            </div>
            <div class="m-4 p-3 w-70">
                <label for="exampleInputPassword1" class="form-label"><b>Password :</b></label>
                <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Enter your password"
                    required>
            </div>
            <div class="m-4 p-3 form-check">
                <input type="checkbox" class="form-check-input" id="exampleCheck1">
                <label class="form-check-label" for="exampleCheck1">Check me out</label>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>


        </form>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
