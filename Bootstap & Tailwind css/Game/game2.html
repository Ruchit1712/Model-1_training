<html>

<head>
    <title>css property</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale=1.0">

    <style>
        

        .Game2{
            height: 400px;
            width: 400px;
            background-color: lightslategray;
            margin-top: 10px;
            margin-left: 7px;
            border-radius: 10px;
            margin-left: 400px;
            text-align: center;
            font-size: 40px;
            margin-top: 50px;
            padding-bottom: 50px;
        }

        

        .box11, .box12, .box13{
            height: 80px;
            width: 80px;
            border-radius: 10px;
            border: 3px solid rgb(127, 253, 255);
            display: inline-block;
            gap: 5px;
            margin-top: 20px;
            background-color: lightblue;
            margin-left: 20px;
        }

        .col1, .col2, .col3{
            height: 80px;
            width: 80px;
            border-radius: 10px;
             border: 3px solid rgb(127, 253, 255);
            display: inline-block;
            gap: 5px;
            margin-top: 20px;
             background-color: lightblue;
            margin-left: 20px;
        }
       
        
    </style>

</head>

<body>

    

    <div class="Game2">Tic Tac Toe
            
            <div class="row1">
                <div class="box11"></div>
                <div class="box12"></div>
                <div class="box13"></div>
            </div>
        
            <div class="row2">
                <div class="col1"></div>
                <div class="col2"></div>
                <div class="col3"></div>
            </div>

            <div class="row3">
                <div class="col1"></div>
                <div class="col2"></div>
                <div class="col3"></div>
            </div>
           
    </div>

</body>

</html>
