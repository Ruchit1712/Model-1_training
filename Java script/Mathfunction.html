<!DOCTYPE html>
<html>

<body>

    <h2>JavaScript Maths Function</h2>

    <p id="demo"></p>

    <script>

        let text = "";

        text += "Round(4.6): " + Math.round(4.6) + "<br>";
        text += "Ceil(4.4): " + Math.ceil(4.4) + "<br>";
        text += "Floor(4.7): " + Math.floor(4.7) + "<br>";
        text += "Trunc(4.7): " + Math.trunc(4.7) + "<br>";
        text += "Pow(8,2): " + Math.pow(8, 2) + "<br>";
        text += "Sqrt(64): " + Math.sqrt(64) + "<br>";
        text += "Abs(-4.7): " + Math.abs(-4.7) + "<br>";
        text += "Sin(90): " + Math.sin(90 * Math.PI / 180) + "<br>";
        text += "Cos(0): " + Math.cos(0 * Math.PI / 180) + "<br>";
        text += "Min Value: " + Math.min(0, 150, 30, 20, -8, -200) + "<br>";
        text += "Max Value: " + Math.max(0, 150, 30, 20, -8, -200) + "<br>";
        text += "Random Value: " + Math.random() + "<br>";
        text += "Log(1): " + Math.log(1);

        document.getElementById("demo").innerHTML = text;

    </script>

</body>

</html>
